version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: retune
      POSTGRES_PASSWORD: retune
      POSTGRES_DB: retune
    ports:
      - "5432:5432"
    volumes:
      - retune_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retune -d retune"]
      interval: 10s
      timeout: 5s
      retries: 10

  retune:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - RETUNE_DB_KIND=postgres
      - RETUNE_DATABASE_URL=postgresql://retune:retune@postgres:5432/retune
      - RETUNE_PERSIST=postgres
      - JWT_SECRET=${JWT_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  retune_pg:
